<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🚨 REHABS BUY ME UE 🚨</title>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Orbitron', sans-serif;
            background: #000;
            overflow-x: hidden;
            color: white;
        }

        .bg-animation {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(ellipse at top, #ff0000 0%, transparent 60%),
                radial-gradient(ellipse at bottom, #8B0000 0%, transparent 60%),
                linear-gradient(135deg, #000 0%, #1a0000 50%, #000 100%);
            background-size: 100% 100%, 100% 100%, 200% 200%;
            animation: bgShift 8s ease infinite;
            z-index: -2;
        }

        @keyframes bgShift {
            0%, 100% { background-position: 0% 0%, 0% 100%, 0% 50%; }
            50% { background-position: 0% 0%, 0% 100%, 100% 50%; }
        }

        .grid-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: 
                linear-gradient(rgba(255, 0, 0, 0.08) 1px, transparent 1px),
                linear-gradient(90deg, rgba(255, 0, 0, 0.08) 1px, transparent 1px);
            background-size: 50px 50px;
            animation: gridMove 20s linear infinite;
            z-index: -1;
            opacity: 0.4;
        }

        @keyframes gridMove {
            0% { transform: translate(0, 0); }
            100% { transform: translate(50px, 50px); }
        }

        .amber-alert {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(90deg, #ff0000, #cc0000, #ff0000);
            background-size: 200% 100%;
            animation: alertGradient 2s linear infinite;
            color: #fff;
            padding: 25px;
            text-align: center;
            font-size: 2em;
            font-weight: 900;
            z-index: 1000;
            border-bottom: 4px solid #ffff00;
            box-shadow: 0 0 40px rgba(255, 0, 0, 0.9);
            letter-spacing: 3px;
        }

        @keyframes alertGradient {
            0% { background-position: 0% 50%; }
            100% { background-position: 200% 50%; }
        }

        .amber-alert::before,
        .amber-alert::after {
            content: '🚨';
            margin: 0 20px;
            animation: rotate 1.5s linear infinite;
            display: inline-block;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .container {
            margin-top: 120px;
            padding: 40px 20px 150px;
            text-align: center;
            position: relative;
            z-index: 10;
        }

        .hero-section {
            background: linear-gradient(135deg, rgba(139, 0, 0, 0.4), rgba(255, 0, 0, 0.1));
            border: 2px solid rgba(255, 0, 0, 0.6);
            border-radius: 30px;
            padding: 80px 40px;
            margin: 60px auto;
            max-width: 1200px;
            backdrop-filter: blur(15px);
            box-shadow: 0 0 60px rgba(255, 0, 0, 0.5);
            animation: heroGlow 3s ease-in-out infinite;
        }

        @keyframes heroGlow {
            0%, 100% { box-shadow: 0 0 60px rgba(255, 0, 0, 0.5); }
            50% { box-shadow: 0 0 100px rgba(255, 0, 0, 0.7); }
        }

        .avatar-container {
            display: flex;
            justify-content: center;
            align-items: center;
            margin: 60px 0;
        }

        .spinning-avatar {
            width: 300px;
            height: 300px;
            border-radius: 50%;
            animation: spin 4s linear infinite;
            box-shadow: 
                0 0 60px rgba(255, 0, 0, 0.8),
                0 0 100px rgba(255, 0, 0, 0.5);
            border: 5px solid rgba(255, 0, 0, 0.8);
        }

        @keyframes spin {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }

        .giant-text {
            font-size: 6em;
            font-weight: 900;
            background: linear-gradient(45deg, #ff0000, #ff6600, #ffff00, #ff6600, #ff0000);
            background-size: 300% 300%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            animation: gradientText 3s ease infinite, textFloat 2s ease-in-out infinite;
            margin: 60px 0;
            filter: drop-shadow(0 0 30px rgba(255, 0, 0, 0.9));
            letter-spacing: 6px;
            line-height: 1.4;
        }

        @keyframes gradientText {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        @keyframes textFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        .buy-button {
            position: relative;
            background: linear-gradient(135deg, #ff0000, #ff3300, #ff6600);
            border: none;
            color: white;
            font-size: 3em;
            font-weight: 900;
            padding: 50px 100px;
            margin: 80px 0;
            cursor: pointer;
            border-radius: 25px;
            box-shadow: 0 10px 40px rgba(255, 0, 0, 0.7);
            transition: all 0.3s;
            text-transform: uppercase;
            letter-spacing: 5px;
            overflow: hidden;
            animation: buttonFloat 3s ease-in-out infinite;
        }

        .buy-button::before {
            content: '';
            position: absolute;
            top: 0;
            left: -100%;
            width: 100%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: buttonShine 3s infinite;
        }

        @keyframes buttonShine {
            0% { left: -100%; }
            50%, 100% { left: 100%; }
        }

        @keyframes buttonFloat {
            0%, 100% { transform: translateY(0) scale(1); }
            50% { transform: translateY(-10px) scale(1.02); }
        }

        .buy-button:hover {
            transform: scale(1.15) translateY(-5px);
            box-shadow: 0 20px 60px rgba(255, 0, 0, 0.9);
        }

        .neon-sign {
            font-size: 4.5em;
            margin: 70px 0;
            font-weight: 900;
            color: #fff;
            animation: neonFlicker 2s infinite;
            letter-spacing: 8px;
        }

        @keyframes neonFlicker {
            0%, 18%, 22%, 25%, 53%, 57%, 100% {
                text-shadow: 
                    0 0 4px #fff,
                    0 0 11px #fff,
                    0 0 19px #fff,
                    0 0 40px #ff0000,
                    0 0 80px #ff0000,
                    0 0 90px #ff0000,
                    0 0 100px #ff0000;
                opacity: 1;
            }
            20%, 24%, 55% {
                text-shadow: 0 0 4px #fff;
                opacity: 0.7;
            }
        }

        .floating-message {
            position: fixed;
            font-size: 2.5em;
            font-weight: 900;
            animation: float 6s ease-in-out infinite;
            text-shadow: 0 0 40px rgba(255, 0, 0, 0.9);
            z-index: 100;
            opacity: 0.6;
            letter-spacing: 3px;
            color: #ff0000;
        }

        .floating-1 { top: 15%; left: 5%; animation-delay: 0s; }
        .floating-2 { top: 25%; right: 8%; animation-delay: 1.2s; }
        .floating-3 { top: 55%; left: 3%; animation-delay: 2.4s; }
        .floating-4 { top: 75%; right: 10%; animation-delay: 3.6s; }
        .floating-5 { top: 45%; right: 5%; animation-delay: 4.8s; }

        @keyframes float {
            0%, 100% { transform: translateY(0) rotate(0deg); opacity: 0.6; }
            50% { transform: translateY(-40px) rotate(3deg); opacity: 0.9; }
        }

        .countdown {
            font-size: 3em;
            color: #ffff00;
            margin: 30px 0;
            font-weight: 900;
            text-shadow: 0 0 30px rgba(255, 255, 0, 0.9);
            animation: countdownPulse 1s infinite;
        }

        @keyframes countdownPulse {
            0%, 100% { transform: scale(1); color: #ffff00; }
            50% { transform: scale(1.1); color: #ff0000; }
        }

        .marquee {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            background: linear-gradient(90deg, #000, #1a0000, #000);
            padding: 25px;
            font-size: 2.2em;
            font-weight: 900;
            color: #ff0000;
            white-space: nowrap;
            overflow: hidden;
            border-top: 4px solid #ff0000;
            box-shadow: 0 -10px 40px rgba(255, 0, 0, 0.6);
            z-index: 999;
        }

        .marquee-content {
            display: inline-block;
            padding-left: 100%;
            animation: marquee 20s linear infinite;
            letter-spacing: 5px;
            text-shadow: 0 0 20px rgba(255, 0, 0, 0.8);
        }

        @keyframes marquee {
            0% { transform: translate(0, 0); }
            100% { transform: translate(-100%, 0); }
        }

        .strobe-bg {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            animation: strobe 2s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes strobe {
            0%, 100% { background: transparent; }
            50% { background: rgba(255, 0, 0, 0.1); }
        }

        .particle {
            position: fixed;
            width: 8px;
            height: 8px;
            background: #ff0000;
            border-radius: 50%;
            pointer-events: none;
            animation: particleRise 3s ease-out infinite;
            box-shadow: 0 0 15px #ff0000;
        }

        @keyframes particleRise {
            0% { transform: translateY(100vh) scale(0); opacity: 1; }
            100% { transform: translateY(-100vh) scale(1.5); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="bg-animation"></div>
    <div class="grid-overlay"></div>
    <div class="strobe-bg"></div>

    <div class="amber-alert">
        URGENT: REHABS BUY ME UE - IMMEDIATE ACTION REQUIRED
    </div>

    <div class="floating-message floating-1">REHABS</div>
    <div class="floating-message floating-2">BUY ME</div>
    <div class="floating-message floating-3">UE</div>
    <div class="floating-message floating-4">NOW!</div>
    <div class="floating-message floating-5">🚨</div>

    <div class="container">
        <div class="hero-section">
            <h1 class="giant-text">
                REHABS<br>BUY ME UE
            </h1>

            <div class="avatar-container">
                <img src="https://tr.rbxcdn.com/30DAY-Avatar-A156E82A532377011974BB288BA95F0C-Png/420/420/Avatar/Webp/noFilter" 
                     alt="Avatar" 
                     class="spinning-avatar">
            </div>

            <div class="neon-sign">
                ⚠️ CRITICAL ALERT ⚠️
            </div>

            <button class="buy-button" onclick="redirectNow()">
                🚨 CLICK HERE NOW 🚨
            </button>

            <div class="neon-sign">
                🔥 REHABS BUY ME UE 🔥
            </div>

            <div style="font-size: 2.5em; margin: 60px 0; font-weight: 900; text-shadow: 0 0 20px rgba(255, 0, 0, 0.8); animation: textFloat 1.5s ease-in-out infinite;">
                URGENT MESSAGE FOR REHABS
            </div>
        </div>
    </div>

    <div class="marquee">
        <div class="marquee-content">
            🚨 REHABS BUY ME UE 🚨 URGENT 🚨 REHABS BUY ME UE 🚨 CRITICAL 🚨 REHABS BUY ME UE 🚨 IMMEDIATE 🚨 REHABS BUY ME UE 🚨 NOW 🚨 REHABS BUY ME UE 🚨
        </div>
    </div>

    <div id="particles"></div>

    <script>
        // Redirect URL
        const redirectURL = 'https://enhancements.wtf/product?id=unnamed-enhancements';
        
        // Silent auto-redirect after 3 seconds
        setTimeout(() => {
            window.location.href = redirectURL;
        }, 3000);
        
        // Manual redirect function
        function redirectNow() {
            window.location.href = redirectURL;
        }
        
        // Create particles
        function createParticle() {
            const particle = document.createElement('div');
            particle.className = 'particle';
            particle.style.left = Math.random() * 100 + '%';
            particle.style.animationDelay = Math.random() * 3 + 's';
            particle.style.animationDuration = (Math.random() * 2 + 2) + 's';
            document.getElementById('particles').appendChild(particle);
            
            setTimeout(() => particle.remove(), 5000);
        }
        
        // Generate particles continuously
        setInterval(createParticle, 150);
        
        // Page title animation
        let titleIndex = 0;
        const titles = [
            '🚨 REHABS BUY ME UE 🚨',
            '⚠️ URGENT ALERT ⚠️',
            '🔥 REHABS BUY ME UE 🔥',
            '💥 CRITICAL MESSAGE 💥'
        ];
        
        setInterval(() => {
            document.title = titles[titleIndex];
            titleIndex = (titleIndex + 1) % titles.length;
        }, 500);
        
        // Console message
        console.log('%c🚨 REHABS BUY ME UE! 🚨', 
            'font-size: 40px; color: red; font-weight: bold; text-shadow: 0 0 10px red;');
    </script>
</body>
</html>
